<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#10243b"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity=".28"/></filter>
    <style>
      .cn{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif}.title{font-size:58px;font-weight:700;fill:#f8fbff}.sub{font-size:25px;fill:#9cb4cc}.h{font-size:34px;font-weight:700;fill:#f8fbff}.p{font-size:23px;fill:#c7d6e5}.tag{font-size:21px;font-weight:600}.line{stroke:#84a6c8;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1280" height="900" rx="0" fill="url(#bg)"/>
  <circle cx="1090" cy="120" r="210" fill="#0ea5e9" opacity=".08"/><circle cx="110" cy="780" r="230" fill="#f97316" opacity=".07"/>
  <text x="640" y="92" text-anchor="middle" class="cn title">四种架构，一眼分清</text>
  <text x="640" y="137" text-anchor="middle" class="cn sub">不是 Agent 越多越好，而是上下文与控制权要放对位置</text>

  <g filter="url(#shadow)">
    <rect x="70" y="205" width="540" height="245" rx="28" fill="#142c45" stroke="#27c2a3" stroke-width="3"/>
    <circle cx="135" cy="270" r="34" fill="#27c2a3"/><text x="135" y="281" text-anchor="middle" class="cn h" font-size="28">1</text>
    <text x="190" y="278" class="cn h">Skills</text><text x="190" y="315" class="cn tag" fill="#55e1c3">按需加载</text>
    <text x="105" y="365" class="cn p">一个 Agent 保持控制权</text><text x="105" y="402" class="cn p">需要时才加载专业知识与指令</text>
    <rect x="418" y="332" width="138" height="44" rx="12" fill="#1d4f58"/><text x="487" y="362" text-anchor="middle" class="cn tag" fill="#8af3dd">连续对话</text>
    <rect x="418" y="387" width="138" height="44" rx="12" fill="#1d4f58"/><text x="487" y="417" text-anchor="middle" class="cn tag" fill="#8af3dd">低复杂度</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="670" y="205" width="540" height="245" rx="28" fill="#142c45" stroke="#4aa7ff" stroke-width="3"/>
    <circle cx="735" cy="270" r="34" fill="#4aa7ff"/><text x="735" y="281" text-anchor="middle" class="cn h" font-size="28">2</text>
    <text x="790" y="278" class="cn h">Sub-Agent</text><text x="790" y="315" class="cn tag" fill="#87c6ff">委派与隔离</text>
    <text x="705" y="365" class="cn p">主 Agent 拆解并委派任务</text><text x="705" y="402" class="cn p">专家使用独立上下文并返回结果</text>
    <rect x="1018" y="332" width="138" height="44" rx="12" fill="#193f66"/><text x="1087" y="362" text-anchor="middle" class="cn tag" fill="#a8d6ff">可并行</text>
    <rect x="1018" y="387" width="138" height="44" rx="12" fill="#193f66"/><text x="1087" y="417" text-anchor="middle" class="cn tag" fill="#a8d6ff">强隔离</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="505" width="540" height="245" rx="28" fill="#142c45" stroke="#f0a84b" stroke-width="3"/>
    <circle cx="135" cy="570" r="34" fill="#f0a84b"/><text x="135" y="581" text-anchor="middle" class="cn h" font-size="28">3</text>
    <text x="190" y="578" class="cn h">Handoff</text><text x="190" y="615" class="cn tag" fill="#ffd18b">状态交接</text>
    <text x="105" y="665" class="cn p">当前角色完成阶段后</text><text x="105" y="702" class="cn p">把状态与控制权交给下一角色</text>
    <rect x="418" y="632" width="138" height="44" rx="12" fill="#5a4022"/><text x="487" y="662" text-anchor="middle" class="cn tag" fill="#ffe0ad">顺序流程</text>
    <rect x="418" y="687" width="138" height="44" rx="12" fill="#5a4022"/><text x="487" y="717" text-anchor="middle" class="cn tag" fill="#ffe0ad">强状态</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="670" y="505" width="540" height="245" rx="28" fill="#142c45" stroke="#b58cff" stroke-width="3"/>
    <circle cx="735" cy="570" r="34" fill="#b58cff"/><text x="735" y="581" text-anchor="middle" class="cn h" font-size="28">4</text>
    <text x="790" y="578" class="cn h">Router</text><text x="790" y="615" class="cn tag" fill="#d5c0ff">分类与分发</text>
    <text x="705" y="665" class="cn p">先把输入拆成独立子问题</text><text x="705" y="702" class="cn p">并行交给专家，再合成结果</text>
    <rect x="1018" y="632" width="138" height="44" rx="12" fill="#443268"/><text x="1087" y="662" text-anchor="middle" class="cn tag" fill="#e3d5ff">可并行</text>
    <rect x="1018" y="687" width="138" height="44" rx="12" fill="#443268"/><text x="1087" y="717" text-anchor="middle" class="cn tag" fill="#e3d5ff">弱状态</text>
  </g>
  <text x="640" y="835" text-anchor="middle" class="cn sub">AI悦创 · Agent 工程指南</text>
</svg>

