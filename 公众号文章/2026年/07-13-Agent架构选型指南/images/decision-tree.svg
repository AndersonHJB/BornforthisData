<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1180" viewBox="0 0 1280 1180">
  <defs><linearGradient id="b3" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071320"/><stop offset="1" stop-color="#102a43"/></linearGradient><filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-opacity=".3"/></filter><style>.cn{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif}.t{font-size:54px;font-weight:700;fill:#fff}.s{font-size:23px;fill:#9fb7cc}.q{font-size:25px;font-weight:600;fill:#f4f9fd}.a{font-size:25px;font-weight:700}.small{font-size:20px;fill:#b9cad8}.line{stroke:#7195b5;stroke-width:4;fill:none}.yn{font-size:20px;font-weight:700;fill:#89a9c4}</style></defs>
  <rect width="1280" height="1180" fill="url(#b3)"/>
  <text x="640" y="78" text-anchor="middle" class="cn t">你的任务，真的需要多 Agent 吗？</text><text x="640" y="118" text-anchor="middle" class="cn s">从最轻的结构开始，只在出现明确瓶颈时升级</text>
  <g filter="url(#sh)"><rect x="360" y="165" width="560" height="96" rx="24" fill="#163a57" stroke="#49b9ff" stroke-width="3"/><text x="640" y="225" text-anchor="middle" class="cn q">任务单一、工具少、上下文短？</text></g>
  <path d="M640 261V330H310" class="line"/><path d="M640 330H970V380" class="line"/><text x="455" y="320" class="cn yn">是</text><text x="850" y="320" class="cn yn">否</text>
  <g filter="url(#sh)"><rect x="90" y="380" width="440" height="110" rx="24" fill="#133f38" stroke="#2bd0a9" stroke-width="3"/><text x="310" y="428" text-anchor="middle" class="cn a" fill="#85f2d7">单 Agent + Tools</text><text x="310" y="463" text-anchor="middle" class="cn small">先跑通任务闭环</text></g>
  <g filter="url(#sh)"><rect x="750" y="380" width="440" height="110" rx="24" fill="#163a57" stroke="#49b9ff" stroke-width="3"/><text x="970" y="446" text-anchor="middle" class="cn q">只是工具与说明越来越多？</text></g>
  <path d="M970 490V565H310" class="line"/><path d="M970 565V615" class="line"/><text x="455" y="555" class="cn yn">是</text><text x="985" y="555" class="cn yn">否</text>
  <g filter="url(#sh)"><rect x="90" y="615" width="440" height="110" rx="24" fill="#123f44" stroke="#36d1c4" stroke-width="3"/><text x="310" y="663" text-anchor="middle" class="cn a" fill="#8ff4ec">Skills</text><text x="310" y="698" text-anchor="middle" class="cn small">按需加载，保持对话连续</text></g>
  <g filter="url(#sh)"><rect x="750" y="615" width="440" height="110" rx="24" fill="#163a57" stroke="#49b9ff" stroke-width="3"/><text x="970" y="681" text-anchor="middle" class="cn q">多领域子任务可以独立并行？</text></g>
  <path d="M970 725V800H310" class="line"/><path d="M970 800V850" class="line"/><text x="455" y="790" class="cn yn">是</text><text x="985" y="790" class="cn yn">否</text>
  <g filter="url(#sh)"><rect x="90" y="850" width="440" height="135" rx="24" fill="#2d2852" stroke="#ad8cff" stroke-width="3"/><text x="310" y="900" text-anchor="middle" class="cn a" fill="#dccfff">Router / Sub-Agent</text><text x="310" y="936" text-anchor="middle" class="cn small">可先分类：Router</text><text x="310" y="966" text-anchor="middle" class="cn small">需持续委派与验收：Sub-Agent</text></g>
  <g filter="url(#sh)"><rect x="750" y="850" width="440" height="135" rx="24" fill="#57391c" stroke="#f0a84b" stroke-width="3"/><text x="970" y="900" text-anchor="middle" class="cn a" fill="#ffd99d">Handoff</text><text x="970" y="936" text-anchor="middle" class="cn small">仅当流程有清晰阶段、状态</text><text x="970" y="966" text-anchor="middle" class="cn small">与退出条件时使用</text></g>
  <rect x="160" y="1040" width="960" height="78" rx="20" fill="#112f48" stroke="#365d7c" stroke-width="2"/><text x="640" y="1089" text-anchor="middle" class="cn q">仍然同时命中多个条件？再组合架构，并为每个边界设置检查点</text>
  <text x="640" y="1150" text-anchor="middle" class="cn s">AI悦创 · Agent 工程指南</text>
</svg>
