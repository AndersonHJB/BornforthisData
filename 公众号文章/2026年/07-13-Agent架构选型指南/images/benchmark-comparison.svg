<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="840" viewBox="0 0 1280 840">
  <defs><linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7fbff"/><stop offset="1" stop-color="#e9f3fb"/></linearGradient><style>.cn{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif}.t{font-size:52px;font-weight:700;fill:#10243b}.s{font-size:22px;fill:#5d7288}.h{font-size:28px;font-weight:700;fill:#153149}.c{font-size:24px;fill:#24445f}.n{font-size:30px;font-weight:700;fill:#0969a7}.note{font-size:20px;fill:#63788d}</style></defs>
  <rect width="1280" height="840" fill="url(#bg2)"/>
  <text x="640" y="80" text-anchor="middle" class="cn t">调用少，不一定 Token 更省</text>
