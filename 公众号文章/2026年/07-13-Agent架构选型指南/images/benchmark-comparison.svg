  <g class="cn n"><text x="470" y="323" text-anchor="middle">4 次</text><text x="470" y="428" text-anchor="middle">3 次</text><text x="470" y="533" text-anchor="middle">3 次</text><text x="470" y="638" text-anchor="middle">3 次</text><text x="765" y="323" text-anchor="middle">8 次</text><text x="765" y="428" text-anchor="middle">5 次</text><text x="765" y="533" text-anchor="middle">5 次</text><text x="765" y="638" text-anchor="middle">6 次</text><text x="1065" y="323" text-anchor="middle">约 9K</text><text x="1065" y="428" text-anchor="middle">约 15K</text><text x="1065" y="533" text-anchor="middle">约 14K+</text><text x="1065" y="638" text-anchor="middle">约 9K</text></g>
